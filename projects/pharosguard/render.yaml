services:
  - type: web
    name: pharosguard
    env: python
    buildCommand: pip install --break-system-packages -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
